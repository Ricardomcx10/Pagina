<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MiWebPro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor-registro">
        <form class="formulario-registro" id="registroForm">
            <h2>Crear Cuenta</h2>
            <div class="grupo-input">
                <label>👤 Nombre completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre" required>
            </div>
            <div class="grupo-input">
                <label>✉️ Correo electrónico</label>
                <input type="email" id="correo" placeholder="tu@correo.com" required>
            </div>
            <div class="grupo-input">
                <label>🔒 Contraseña</label>
                <input type="password" id="password" placeholder="Crea una contraseña" required>
            </div>
            <div class="grupo-input">
                <label>🔑 Confirmar contraseña</label>
                <input type="password" id="confirmar-password" placeholder="Repite tu contraseña" required>
            </div>
            <button type="submit" class="btn-registro">Registrarse</button>
        </form>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmar-password').value;

            if (pass !== confirm) {
                alert("❌ Las contraseñas no coinciden.");
                return;
            }

            localStorage.setItem('usuarioNombre', nombre);
            alert("✅ ¡Registro exitoso! Bienvenido, " + nombre + ". Redirigiendo a tu panel...");
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
